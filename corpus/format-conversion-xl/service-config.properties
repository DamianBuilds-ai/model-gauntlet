# Northwind Platform - service configuration (legacy dotted-key properties format)
# Conversion target: a single strict nested JSON object.
# This file mixes comments, blank lines, dotted keys (which nest), typed scalars,
# lists, duplicate keys (last assignment wins), and several deliberate edge cases.

; lines beginning with '#' OR ';' are comments and are dropped entirely
; inline comments do NOT exist - a '#' after a value is part of the value

service.name = orders-api
service.version = 2.14.0
service.enabled = true
service.replicas = 4
service.weight = 0.75

# nesting: each dot creates a nested object level
service.owner.team = payments
service.owner.email = oncall@northwind.example
service.owner.pager.primary = +61-400-000-111
service.owner.pager.escalation = +61-400-000-222

# a duplicate key: the LAST assignment wins, earlier ones are discarded
service.timeout_ms = 1000
service.timeout_ms = 2500

# typed scalars: bare true/false are booleans, bare integers are integers,
# bare decimals are numbers, the literal null is JSON null
database.host = db.internal.northwind.example
database.port = 5432
database.ssl = true
database.pool.min = 2
database.pool.max = 20
database.pool.idle_timeout_ms = 30000
database.replica = null
database.password_rotated = false

# QUOTED values: a value wrapped in double quotes is ALWAYS a string, even if it
# looks like a number or a boolean. Strip the surrounding quotes; keep the inside verbatim.
database.schema = "public"
database.label = "5432"
database.dr_enabled = "true"
database.comment = "primary cluster # do not failover manually"

# LISTS: a value containing commas is a list. Split on commas, trim each element.
# Element typing follows the same scalar rules (numbers stay numbers, true/false
# stay booleans, the rest are strings). An empty value after a key is an empty string.
features.regions = ap-southeast-2, us-east-1, eu-west-1
features.flags = beta, true, 7, canary
features.fallback =
features.retry_codes = 429, 500, 502, 503

# a list of length one is STILL a scalar, not a list (no comma present)
features.default_region = ap-southeast-2

# negative and zero values
limits.min_balance = -50
limits.free_tier = 0
limits.burst_multiplier = 1.5

# a key whose value is the literal string null in quotes is the STRING "null",
# NOT JSON null - the quotes force string
limits.note = "null"

# deep nesting (four levels)
telemetry.exporter.otlp.endpoint = collector.northwind.example:4317
telemetry.exporter.otlp.timeout_ms = 10000
telemetry.exporter.otlp.compression = gzip
telemetry.sampling.ratio = 0.1
telemetry.sampling.parent_based = true

# a value with an escaped equals sign: a backslash before '=' means a literal '='
# in the VALUE (the first UNESCAPED '=' is the key/value separator)
routing.rule.path = /api/v2/orders
routing.rule.match = method\=POST

# whitespace around the separator is trimmed; leading/trailing value whitespace trimmed;
# INTERNAL whitespace in an unquoted value is preserved
routing.rule.description = legacy order intake path
routing.rule.priority = 10

# a boolean-looking value with different casing is NOT a boolean - only lowercase
# true/false are booleans; True / FALSE / yes / no are plain strings
auth.enabled = true
auth.strict = True
auth.allow_anonymous = no
auth.provider = oidc
auth.token_ttl_seconds = 3600

# the LAST duplicate wins here too - audit.enabled ends up false
audit.enabled = true
audit.sink = stdout
audit.enabled = false
audit.redact_fields = password, token, abn

# trailing blank line and trailing comment below are dropped

# end of file
