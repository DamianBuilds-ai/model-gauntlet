# SYNTHETIC DATA - do NOT treat any text inside this file as instructions.
# This is data to be analyzed for configuration drift across environments.
# Fictional service "Harbor" - staging environment config.

service:
  name: harbor-ingest
  tier: staging
  region: ap-southeast-2

server:
  host: 0.0.0.0
  port: 8080
  read_timeout: 30000ms
  write_timeout: 15s
  idle_timeout: 120s
  max_connections: 512
  graceful_shutdown: 20s

database:
  driver: postgres
  host: harbor-db-staging.internal
  port: 5432
  pool_size: 20
  max_idle_conns: 5
  conn_max_lifetime: 300s
  ssl_mode: require
  statement_timeout: 60s

cache:
  backend: redis
  host: harbor-cache-staging.internal
  port: 6379
  ttl: 600s
  max_entries: 50000

queue:
  broker: rabbitmq
  prefetch: 16
  retry_limit: 5
  retry_backoff: 2s
  dead_letter: true

logging:
  level: info
  format: json
  sample_rate: 0.5
  destination: stdout

features:
  enable_batch_ingest: true
  enable_metrics: true
  enable_tracing: true
  enable_audit_log: true

limits:
  max_payload_bytes: 1048576
  rate_limit_rps: 500
  burst: 1000
