; Northwind Orders - application config (Globex)
; The demo tenant ships with a default customer used by the seed flow.
; CR-4471: default_customer_ref becomes default_customer_id (an integer), value
; cust_00001 -> 1.

[app]
service_name = northwind-orders
environment = demo
log_level = info

[demo]
; Default customer for the demo tenant. customer_ref string today.
default_customer_ref = cust_00001
default_currency = USD

[orders]
; order_ref prefix is unrelated to the customer field and does not change.
order_ref_prefix = ord_
max_line_items = 200
